<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion · Frenchois</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f7f4ef;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:48px 40px;width:min(440px,100%);box-shadow:0 8px 40px rgba(0,0,0,.1)}
.logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;text-align:center;margin-bottom:6px;color:#1c1c2e}
.logo span{color:#7c3aed}
.subtitle{font-size:13px;color:#7a7a8c;text-align:center;margin-bottom:36px;line-height:1.6}
.form-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#7a7a8c;margin-bottom:6px;display:block}
.form-input{width:100%;border:2px solid #e4ddd4;border-radius:12px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .15s;color:#1c1c2e;background:#f7f4ef}
.form-input:focus{border-color:#7c3aed;background:#fff}
.submit-btn{width:100%;padding:15px;border-radius:12px;border:none;background:#7c3aed;color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .18s;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:#6d28d9;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.6;cursor:default;transform:none}
.msg{margin-top:16px;padding:14px 18px;border-radius:12px;font-size:13px;font-weight:700;text-align:center;display:none;line-height:1.6}
.msg.error{background:#fdecea;color:#b02030;display:block}
.sent-card{display:none;text-align:center;padding:10px 0}
.sent-icon{font-size:48px;margin-bottom:16px}
.sent-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1c1c2e;margin-bottom:10px}
.sent-text{font-size:13px;color:#7a7a8c;line-height:1.7;margin-bottom:24px}
.sent-email{font-weight:800;color:#7c3aed}
.resend-btn{background:none;border:1.5px solid #e4ddd4;border-radius:10px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#7a7a8c;cursor:pointer;transition:all .15s}
.resend-btn:hover{border-color:#7c3aed;color:#7c3aed}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Frenchois<span>.</span></div>
  <div class="subtitle">Tu cours de français en ligne</div>

  <div id="login-form">
    <label class="form-label">Tu adresse email</label>
    <input class="form-input" type="email" id="email" placeholder="ton@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')sendLink()">
    <button class="submit-btn" id="submit-btn" onclick="sendLink()">
      <span>&#9993;&#65039;</span> Recibir mi enlace de acceso
    </button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="sent-card" class="sent-card">
    <div class="sent-icon">&#128236;</div>
    <div class="sent-title">&#161;Revisa tu correo!</div>
    <div class="sent-text">
      Hemos enviado un enlace de acceso a<br>
      <span class="sent-email" id="sent-email"></span><br><br>
      Haz clic en el enlace para entrar al curso.<br>
      <span style="color:#b86a00">El enlace expira en 1 hora.</span>
    </div>
    <button class="resend-btn" onclick="showForm()">&#8592; Usar otro email</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mvfrirxbhbtenunogdpj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oT738uTwT-dtpbMpWGgFkg_LvODS1a-';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'index.html';
});

async function sendLink() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btn   = document.getElementById('submit-btn');
  const msg   = document.getElementById('msg');

  if (!email || !email.includes('@')) {
    msg.className = 'msg error';
    msg.textContent = 'Introduce una direcci\u00F3n de email v\u00E1lida.';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span>&#9203;</span> Enviando\u2026';
  msg.className = 'msg';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: 'https://exercies-francais.vercel.app/index.html',
      shouldCreateUser: false
    }
  });

  btn.disabled = false;
  btn.innerHTML = '<span>&#9993;&#65039;</span> Recibir mi enlace de acceso';

  if (error) {
    msg.className = 'msg error';
    if (error.message.toLowerCase().includes('not allowed') || error.message.toLowerCase().includes('not found') || error.message.toLowerCase().includes('signup')) {
      msg.textContent = 'Este email no est\u00E1 autorizado. Contacta a tu profesor Dylan.';
    } else {
      msg.textContent = 'Error: ' + error.message;
    }
    return;
  }

  document.getElementById('sent-email').textContent = email;
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('sent-card').style.display = 'block';
}

function showForm() {
  document.getElementById('sent-card').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('email').value = '';
  document.getElementById('msg').className = 'msg';
}
</script>
</body>
</html>

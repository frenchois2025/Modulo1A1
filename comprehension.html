<script>
async function generateText(){
  showView('view-loading');
  const lvDesc={
    A1:'A1 debutant : phrases courtes, present indicatif, vocabulaire simple',
    A2:'A2 elementaire : phrases simples, passe compose, futur proche, vocabulaire courant',
    B1:'B1 intermediaire : phrases complexes, subjonctif, conditionnel, vocabulaire varie'
  };
  const wc={A1:'70',A2:'110',B1:'150'};

  // Le prompt est optimisé pour Gemini
  const prompt = `Tu es un professeur de français. Crée un exercice de compréhension écrite. 
  Niveau: ${CL} (${lvDesc[CL]}). Thème: "${STh}". Type de document: "${ST}". 
  Longueur: environ ${wc[CL]} mots. 
  REPONDS UNIQUEMENT EN JSON STRICT avec cette structure :
  {
    "title": "Titre en français",
    "type": "Type",
    "text": "Texte complet en français",
    "words": [{"word":"mot", "es":"traducción"}],
    "qcm": [{"q":"pregunta en español", "opts":["A","B","C"], "ans":0}],
    "vocab": [{"word":"mot", "es":"trad", "sentence":"phrase avec ___", "answer":"mot", "hint":"pista"}]
  }
  Règles : words=5, qcm=4 questions, vocab=3. Pas de texte avant ou après le JSON.`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt }) // Structure simplifiée pour le backend
    });

    if (!res.ok) throw new Error('Erreur serveur');
    
    const data = await res.json();
    // Le backend renvoie directement le contenu parsé ou une erreur
    if (data.error) throw new Error(data.error);

    CD = JSON.parse(data.content[0].text);

    // Conversion automatique du texte plat en paragraphes pour l'affichage
    if (CD.text && !CD.paragraphs) {
      CD.paragraphs = CD.text.split(/\n+/).filter(p => p.trim()).map(para => {
        return para.split(' ').map(tok => {
          const cleanTok = tok.replace(/[.,!?;:]/g, '');
          const match = (CD.words || []).find(w => w.word === cleanTok);
          return match ? { word: tok, es: match.es } : tok;
        });
      });
    }

    phase = 1; QS = {}; QScore = 0;
    renderReader(); 
    showView('view-reader');
  } catch (err) {
    console.error(err);
    showView('view-gen');
    alert('Erreur : ' + err.message);
  }
}
</script>

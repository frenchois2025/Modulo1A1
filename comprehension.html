<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Français</title>
    </head>
<body>
    <script>
// Ces variables doivent être définies par vos menus de sélection (A1, A2, etc.)
let CL = "A2"; // Niveau par défaut
let STh = "La gastronomie"; // Thème par défaut
let ST = "Article de blog"; // Type par défaut
let CD = {}; // Données de l'exercice

async function generateText() {
    // 1. Afficher l'écran de chargement (si vous en avez un)
    if (typeof showView === 'function') showView('view-loading');

    const promptsParams = {
        A1: { desc: 'débutant, phrases très simples au présent', words: '80' },
        A2: { desc: 'élémentaire, passé composé et futur proche', words: '120' },
        B1: { desc: 'intermédiaire, subjonctif et phrases complexes', words: '180' }
    };

    const prompt = `Tu es un professeur de français (FLE). Crée un exercice complet.
    Niveau: ${CL} (${promptsParams[CL].desc}). Thème: ${STh}. Type: ${ST}.
    
    RENVOIE UNIQUEMENT UN JSON STRICT AVEC CETTE STRUCTURE :
    {
      "title": "Titre",
      "type": "${ST}",
      "text": "Texte de ${promptsParams[CL].words} mots environ en français",
      "words": [{"word":"mot", "es":"traduction espagnole"}],
      "qcm": [{"q":"question en espagnol", "opts":["A","B","C"], "ans":0}],
      "vocab": [{"word":"mot", "es":"trad", "sentence":"phrase avec ___", "answer":"mot", "hint":"pista"}]
    }`;

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Erreur serveur");

        // On parse la chaîne JSON renvoyée par l'IA
        CD = JSON.parse(data.content);

        // Traitement du texte pour la liseuse (paragraphes et mots cliquables)
        if (CD.text) {
            CD.paragraphs = CD.text.split(/\n+/).filter(p => p.trim()).map(para => {
                return para.split(' ').map(token => {
                    const cleanToken = token.replace(/[.,!?;:]/g, '');
                    const match = (CD.words || []).find(w => w.word.toLowerCase() === cleanToken.toLowerCase());
                    return match ? { word: token, es: match.es } : token;
                });
            });
        }

        // Affichage du résultat
        if (typeof renderReader === 'function') renderReader();
        if (typeof showView === 'function') showView('view-reader');

    } catch (err) {
        console.error(err);
        if (typeof showView === 'function') showView('view-gen');
        alert("Erreur lors de la génération : " + err.message);
    }
}
</script>
</body>
</html>

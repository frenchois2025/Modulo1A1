/* (le même style que dans ton A1 module 1) */
* { box-sizing: border-box; margin:0; padding:0; }

.nav-btn[data-lesson="2"]:not(.active):hover { background: var(--l2l); color: var(--l2d); }
.nav-btn[data-lesson="3"]:not(.active):hover { background: var(--l3l); color: var(--l3d); }
.nav-btn[data-lesson="4"]:not(.active):hover { background: var(--l4l); color: var(--l4d); }
.lesson-panel { display: none; }
.lesson-panel.active { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

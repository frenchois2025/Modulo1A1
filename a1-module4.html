<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Français A1 · Module 4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--white:#fff;--text:#1c1c2e;--muted:#7a7a8c;--border:#e4ddd4;
--l1:#e63946;--l1l:#fdecea;--l1d:#b02030;
--l2:#2a7dd1;--l2l:#deeeff;--l2d:#1a5fa0;
--l3:#e88c1a;--l3l:#fff3dc;--l3d:#b86a00;
--l4:#2eaa6b;--l4l:#dcf5ea;--l4d:#1d7a4c;
--l5:#9333ea;--l5l:#f3e8ff;--l5d:#6d28d9;
--shadow:0 4px 24px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.sidebar-logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;padding:0 8px 18px;border-bottom:1px solid var(--border);margin-bottom:10px;line-height:1.3}
.sidebar-logo span{color:var(--l2)}
.sidebar-back{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:10px;transition:all .15s}
.sidebar-back:hover{border-color:var(--text);color:var(--text)}
.nav-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all .18s;width:100%}
.nav-btn .nav-icon{font-size:16px;width:22px;text-align:center}
.nav-btn .nav-badge{margin-left:auto;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;background:rgba(0,0,0,.06)}
.nav-btn[data-l="1"].active{background:var(--l1);color:white}
.nav-btn[data-l="2"].active{background:var(--l2);color:white}
.nav-btn[data-l="3"].active{background:var(--l3);color:white}
.nav-btn[data-l="4"].active{background:var(--l4);color:white}
.nav-btn[data-l="5"].active{background:var(--l5);color:white}
.nav-btn[data-l="1"]:not(.active):hover{background:var(--l1l);color:var(--l1d)}
.nav-btn[data-l="2"]:not(.active):hover{background:var(--l2l);color:var(--l2d)}
.nav-btn[data-l="3"]:not(.active):hover{background:var(--l3l);color:var(--l3d)}
.nav-btn[data-l="4"]:not(.active):hover{background:var(--l4l);color:var(--l4d)}
.nav-btn[data-l="5"]:not(.active):hover{background:var(--l5l);color:var(--l5d)}
.main{flex:1;padding:40px 36px;max-width:860px}
.lesson-panel{display:none}.lesson-panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lesson-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:36px}
.lesson-icon-big{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.lesson-tag{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.lesson-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.2;color:var(--text);margin-bottom:6px}
.lesson-desc{font-size:14px;color:var(--muted);line-height:1.6}
.ex-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:26px;margin-bottom:20px;box-shadow:var(--shadow)}
.ex-title{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.ex-instr{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.qcm-item{margin-bottom:22px}
.q-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;opacity:.6}
.q-text{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:11px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:all .15s}
.opt:hover:not(:disabled){border-color:var(--text);background:var(--white)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--l4);background:var(--l4l);color:var(--l4d)}
.opt.wrong{border-color:var(--l1);background:var(--l1l);color:var(--l1d)}
.fb{margin-top:8px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;display:none}
.fb.show{display:block}.fb.ok{background:var(--l4l);color:var(--l4d)}.fb.nope{background:var(--l1l);color:var(--l1d)}
.fill-item{margin-bottom:16px}
.fill-sentence{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.7}
.fill-input{border:2px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;width:100%;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.fill-input:focus{border-color:var(--l2)}
.fill-input.ok{border-color:var(--l4);background:var(--l4l);color:var(--l4d)}
.fill-input.nope{border-color:var(--l1);background:var(--l1l);color:var(--l1d)}
.fill-hint{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.match-col-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:11px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;font-family:'Nunito',sans-serif;min-height:44px;display:flex;align-items:center;justify-content:center}
.match-item.selected{border-color:var(--l2);background:var(--l2l);color:var(--l2d)}
.match-item.matched-ok{border-color:var(--l4);background:var(--l4l);color:var(--l4d);pointer-events:none}
.match-item.matched-err{border-color:var(--l1);background:var(--l1l);color:var(--l1d);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-score{margin-top:14px;text-align:center;font-size:14px;font-weight:700;color:var(--muted)}
.score-box{border-radius:16px;padding:24px;text-align:center;margin-top:20px;display:none}
.score-box.show{display:block}
.score-emoji{font-size:40px;margin-bottom:8px}
.score-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:4px}
.score-msg{font-size:14px;color:var(--muted)}
.check-btn{margin-top:16px;padding:12px 28px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.check-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.mob-nav{display:none}
@media(max-width:700px){
  .sidebar{display:none}.main{padding:20px 16px}
  .mob-nav{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .mob-nav-btn{flex-shrink:0;padding:7px 13px;border-radius:20px;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--muted)}
  .mob-nav-btn.active{color:white}
  .match-wrap{grid-template-columns:1fr}
}
#el-fab{position:fixed;bottom:22px;right:22px;width:46px;height:46px;border-radius:50%;background:#7c3aed;color:white;border:none;font-size:20px;cursor:pointer;z-index:9999;box-shadow:0 4px 18px rgba(124,58,237,.45);transition:all .2s;display:flex;align-items:center;justify-content:center}
#el-fab:hover{transform:scale(1.1);background:#6d28d9}
#el-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;align-items:center;justify-content:center}
#el-modal.open{display:flex}
#el-box{background:#fff;border-radius:20px;padding:28px;width:min(480px,94vw);box-shadow:0 20px 60px rgba(0,0,0,.2);font-family:'Nunito',sans-serif}
#el-box h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px}
#el-box p{font-size:12px;color:#7a7a8c;margin-bottom:20px;line-height:1.5}
.el-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#7a7a8c;margin-bottom:6px;display:block}
.el-input{width:100%;border:2px solid #e4ddd4;border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;margin-bottom:14px;transition:border-color .15s}
.el-input:focus{border-color:#7c3aed}
.el-select{width:100%;border:2px solid #e4ddd4;border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;margin-bottom:18px;background:#f7f4ef;cursor:pointer}
.el-btns{display:flex;gap:8px;flex-wrap:wrap}
.el-btn{padding:10px 18px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s}
.el-status{margin-top:12px;font-size:13px;font-weight:700;min-height:20px;text-align:center}
.speaking{opacity:.65;pointer-events:none}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>

<script>
// All content is injected dynamically below
function showL(n){
  document.querySelectorAll('.lesson-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('[data-l]').forEach(b=>b.classList.remove('active'));
  window.scrollTo({top:0,behavior:'instant'});
  document.getElementById('panel-'+n).classList.add('active');
  document.querySelectorAll('[data-l="'+n+'"]').forEach(b=>b.classList.add('active'));
}

const AUDIO_CACHE=new Map();
const EL_VOICES=[
  {id:'XB0fDUnXU5powFXDhCwa',name:'Charlotte (féminin)'},
  {id:'onwK4e9ZLuTAKqWW03F9',name:'Daniel (masculin)'},
  {id:'pqHfZKP75CvOlQylNhV4',name:'Bill (masculin)'},
  {id:'jsCqWAovK2LkecY7zXl4',name:'Lily (féminin)'},
];
let EL_KEY=localStorage.getItem('el_api_key')||'';
let EL_VOICE=localStorage.getItem('el_voice_id')||EL_VOICES[0].id;
const VOICE_F='XB0fDUnXU5powFXDhCwa';
const VOICE_M='onwK4e9ZLuTAKqWW03F9';

function browserSpeak(t,r){r=r||.82;window.speechSynthesis.cancel();function g(){const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=r;const v=window.speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith('fr'));if(v)u.voice=v;window.speechSynthesis.speak(u);}window.speechSynthesis.getVoices().length===0?(window.speechSynthesis.onvoiceschanged=g):g();}

function speakWithVoice(text,rate,voice,triggerEl){
  rate=rate||1.0;if(!EL_KEY){browserSpeak(text,rate*0.82);return;}
  const k=text+'||'+voice;
  if(AUDIO_CACHE.has(k)){const a=new Audio(AUDIO_CACHE.get(k));a.playbackRate=rate;a.play();return;}
  if(triggerEl)triggerEl.classList.add('speaking');
  fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voice,{method:'POST',headers:{'xi-api-key':EL_KEY,'Content-Type':'application/json'},body:JSON.stringify({text:'<speak><s xml:lang="fr-FR">'+text+'</s></speak>',model_id:'eleven_multilingual_v2',language_code:'fr',voice_settings:{stability:0.5,similarity_boost:0.75}})})
  .then(r=>r.blob()).then(blob=>{const url=URL.createObjectURL(blob);AUDIO_CACHE.set(k,url);const a=new Audio(url);a.playbackRate=rate;a.play();if(triggerEl)triggerEl.classList.remove('speaking');})
  .catch(()=>{browserSpeak(text,rate*0.82);if(triggerEl)triggerEl.classList.remove('speaking');});
}

async function speak(text,rate,triggerEl){
  rate=rate||1.0;if(!EL_KEY){browserSpeak(text,rate*0.82);return;}
  const k=text+'||'+EL_VOICE;
  if(AUDIO_CACHE.has(k)){const a=new Audio(AUDIO_CACHE.get(k));a.playbackRate=rate;a.play();return;}
  if(triggerEl)triggerEl.classList.add('speaking');
  try{const res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+EL_VOICE,{method:'POST',headers:{'xi-api-key':EL_KEY,'Content-Type':'application/json'},body:JSON.stringify({text:'<speak><s xml:lang="fr-FR">'+text+'</s></speak>',model_id:'eleven_multilingual_v2',language_code:'fr',voice_settings:{stability:0.5,similarity_boost:0.75}})});
  if(!res.ok)throw new Error(res.status);const blob=await res.blob();const url=URL.createObjectURL(blob);AUDIO_CACHE.set(k,url);const a=new Audio(url);a.playbackRate=rate;a.play();}
  catch{browserSpeak(text,rate*0.82);}finally{if(triggerEl)setTimeout(()=>triggerEl.classList.remove('speaking'),400);}
}

function buildELPanel(){
  const fab=document.createElement('button');fab.id='el-fab';fab.title='Configurar voz';fab.textContent='\uD83C\uDF99';
  fab.onclick=()=>document.getElementById('el-modal').classList.add('open');document.body.appendChild(fab);
  const modal=document.createElement('div');modal.id='el-modal';const box=document.createElement('div');box.id='el-box';
  box.innerHTML='<h2>\uD83C\uDF99\uFE0F Voz ElevenLabs</h2><p>Conecta tu cuenta para voz francesa natural.</p>'+
    '<label class="el-label">Clave API</label><input class="el-input" id="el-key-input" type="password" placeholder="sk-...">'+
    '<label class="el-label">Voz</label><select class="el-select" id="el-voice-select"></select>'+
    '<div class="el-btns"><button class="el-btn" style="background:#7c3aed;color:white" onclick="saveEL()">&#128190; Guardar</button>'+
    '<button class="el-btn" style="background:#2eaa6b;color:white" onclick="testEL()">&#9654; Probar</button>'+
    '<button class="el-btn" style="background:#f7f4ef;border:2px solid #e4ddd4" id="el-close-btn">&#x2715; Cerrar</button></div>'+
    '<div class="el-status" id="el-status"></div>';
  modal.appendChild(box);modal.onclick=e=>{if(e.target===modal)modal.classList.remove('open');};document.body.appendChild(modal);
  document.getElementById('el-close-btn').onclick=()=>modal.classList.remove('open');
  const sel=document.getElementById('el-voice-select');
  EL_VOICES.forEach(v=>{const o=document.createElement('option');o.value=v.id;o.textContent=v.name;if(v.id===EL_VOICE)o.selected=true;sel.appendChild(o);});
  document.getElementById('el-key-input').value=EL_KEY;
  const st=document.getElementById('el-status');st.style.color=EL_KEY?'#1d7a4c':'#e88c1a';
  st.textContent=EL_KEY?'\u2713 Clave guardada':'\u26A0 Sin clave \u2192 voz navegador';
}
function saveEL(){EL_KEY=document.getElementById('el-key-input').value.trim();EL_VOICE=document.getElementById('el-voice-select').value;localStorage.setItem('el_api_key',EL_KEY);localStorage.setItem('el_voice_id',EL_VOICE);AUDIO_CACHE.clear();}
async function testEL(){const key=document.getElementById('el-key-input').value.trim();const voice=document.getElementById('el-voice-select').value;const st=document.getElementById('el-status');st.style.color='#7a7a8c';st.textContent='Probando...';try{const res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voice,{method:'POST',headers:{'xi-api-key':key,'Content-Type':'application/json'},body:JSON.stringify({text:'Bonjour !',model_id:'eleven_multilingual_v2',language_code:'fr',voice_settings:{stability:0.5,similarity_boost:0.75}})});if(!res.ok)throw new Error(res.status);const blob=await res.blob();new Audio(URL.createObjectURL(blob)).play();EL_KEY=key;EL_VOICE=voice;localStorage.setItem('el_api_key',key);localStorage.setItem('el_voice_id',voice);st.style.color='#1d7a4c';st.textContent='\u2713 Perfecto!';}catch(err){st.style.color='#e63946';st.textContent='\u2717 '+err.message;}}

const REC={};
async function recStart(id){
  if(REC[id]&&REC[id].recording)return;
  const sEl=document.getElementById('rs_'+id),bEl=document.getElementById('rb_'+id),cEl=document.getElementById('rc_'+id);
  try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});REC[id]={chunks:[],recording:true,blob:null};
  const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':MediaRecorder.isTypeSupported('audio/ogg')?'audio/ogg':MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
  REC[id].recorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
  REC[id].recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)REC[id].chunks.push(e.data);};
  REC[id].recorder.onstop=()=>{REC[id].blob=new Blob(REC[id].chunks,{type:REC[id].recorder.mimeType||'audio/webm'});REC[id].recording=false;stream.getTracks().forEach(t=>t.stop());
  if(sEl){sEl.textContent='\u2713 Grabado!';sEl.style.color='#1d7a4c';}if(bEl){bEl.textContent='\uD83C\uDF99\uFE0F Grabar de nuevo';bEl.style.background='#555';}
  if(cEl){cEl.style.display='flex';let player=document.getElementById('player_'+id);if(!player){player=document.createElement('audio');player.id='player_'+id;player.controls=true;player.style.cssText='width:100%;margin-top:6px;border-radius:8px;';cEl.parentElement.insertBefore(player,cEl.nextSibling);}player.src=URL.createObjectURL(REC[id].blob);}};
  REC[id].recorder.start(100);if(sEl){sEl.textContent='\u25CF Grabando\u2026';sEl.style.color='#e63946';}if(bEl){bEl.textContent='\u23F9 Detener';bEl.style.background='#e63946';}if(cEl)cEl.style.display='none';}
  catch(err){if(sEl){sEl.textContent=err.name==='NotAllowedError'?'\u26A0 Autoriza el micr\u00F3fono':'\u26A0 Micr\u00F3fono no disponible';sEl.style.color='#e63946';}}
}
function recStop(id){if(REC[id]&&REC[id].recording&&REC[id].recorder)REC[id].recorder.stop();}
function recToggle(id){if(REC[id]&&REC[id].recording)recStop(id);else recStart(id);}

function speakRA(btn){const text=btn.dataset.phrase,voice=btn.dataset.voice;if(voice==='f')speakWithVoice(text,1.0,VOICE_F,btn);else if(voice==='m')speakWithVoice(text,1.0,VOICE_M,btn);else speak(text,1.0,btn);}

function buildRA(cid,phrases,color){
  const c=document.getElementById(cid);if(!c)return;c.innerHTML='';
  phrases.forEach((p,i)=>{const rid=cid+'_p'+i;const item=document.createElement('div');item.style.cssText='background:#faf7f2;border:1.5px solid #e8e2d9;border-radius:14px;padding:18px 20px;margin-bottom:12px;';
  item.innerHTML='<div style="font-family:\'Playfair Display\',serif;font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:4px;line-height:1.4">'+p.phrase+'</div>'+
    '<div style="font-size:12px;color:#8a8a9a;margin-bottom:14px">'+p.translation+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">'+

const qcmState={},qcmTally={};
function buildQCM(cid,questions,scoreId){
  const c=document.getElementById(cid);if(!c)return;
  questions.forEach((q,qi)=>{const id=cid+'_'+qi;qcmState[id]={done:false};const div=document.createElement('div');div.className='qcm-item';
  const sb=q.speak?'<button style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:13px;margin-left:8px" onclick="speak(\''+q.speak.replace(/'/g,"\'")+'\')">\uD83D\uDD0A</button>':'';
  div.innerHTML='<div class="q-label">Pregunta '+(qi+1)+'</div><div class="q-text">'+q.q+sb+'</div>'+
    '<div class="opts" id="opts_'+id+'">'+q.opts.map((o,oi)=>'<button class="opt" onclick="answerQCM(\''+id+'\','+oi+','+q.ans+',\''+scoreId+'\','+questions.length+')">'+o+'</button>').join('')+'</div>'+
    '<div class="fb" id="fb_'+id+'"></div>';
  c.appendChild(div);});
}
function answerQCM(id,chosen,correct,scoreId,total){
  if(qcmState[id]&&qcmState[id].done)return;qcmState[id]={done:true};
  const opts=document.querySelectorAll('#opts_'+id+' .opt');
  opts.forEach((b,i)=>{b.disabled=true;if(i===correct)b.classList.add('correct');else if(i===chosen&&chosen!==correct)b.classList.add('wrong');});
  const fb=document.getElementById('fb_'+id);if(fb){fb.textContent=chosen===correct?'\u2705 \u00A1Correcto!':'\u274C Respuesta: '+opts[correct].textContent;fb.className='fb show '+(chosen===correct?'ok':'nope');}
  if(!qcmTally[scoreId])qcmTally[scoreId]={n:0,ok:0,total};qcmTally[scoreId].n++;if(chosen===correct)qcmTally[scoreId].ok++;
  if(qcmTally[scoreId].n===total){const box=document.getElementById(scoreId);if(!box)return;box.classList.add('show');const pct=qcmTally[scoreId].ok/total;
  document.getElementById(scoreId+'-em').textContent=pct>=.8?'\uD83C\uDF89':pct>=.6?'\uD83D\uDC4D':'\uD83D\uDCAA';
  document.getElementById(scoreId+'-n').textContent=qcmTally[scoreId].ok+' / '+total;
  document.getElementById(scoreId+'-m').textContent=pct>=.8?'\u00A1Excelente!':pct>=.6?'\u00A1Bien! Repasa los errores.':'Int\u00E9ntalo de nuevo.';}
}

function checkFill(cid,scoreId){
  const inputs=document.querySelectorAll('#'+cid+' .fill-input');let ok=0;
  inputs.forEach((inp,i)=>{const val=inp.value.trim().toLowerCase();const answers=inp.dataset.answer.split('|').map(a=>a.toLowerCase().trim());const correct=answers.some(a=>val===a||val===a.replace(/-/g,' '));
  inp.className='fill-input '+(correct?'ok':'nope');const hint=document.getElementById(cid+'_hint_'+i);const tr=inp.dataset.translation||'';
  if(!correct){hint.style.cssText='color:#c0392b;font-style:normal;margin-top:4px;font-size:12px';hint.innerHTML='\u2192 <strong>'+inp.dataset.answer.split('|')[0]+'</strong>'+(tr?'<br><span style="color:var(--muted);font-size:11px;font-style:italic">'+tr+'</span>':'');}
  else{ok++;hint.style.cssText='color:var(--l4d);font-style:italic;margin-top:4px;font-size:11px';hint.innerHTML=tr?tr:'';}
  inp.disabled=true;});
  const box=document.getElementById(scoreId);if(!box)return;box.classList.add('show');const pct=ok/inputs.length;
  document.getElementById(scoreId+'-em').textContent=pct>=.8?'\uD83C\uDF89':pct>=.6?'\uD83D\uDC4D':'\uD83D\uDCAA';

}

const matchState={};
function buildMatch(cid,pairs,scoreId){
  const wrap=document.createElement('div');wrap.className='match-wrap';
  const lc=document.createElement('div');lc.className='match-col';const rc=document.createElement('div');rc.className='match-col';
  const lt=document.createElement('div');lt.className='match-col-title';lt.textContent='Fran\u00E7ais';const rt=document.createElement('div');rt.className='match-col-title';rt.textContent='Espa\u00F1ol';
  lc.appendChild(lt);rc.appendChild(rt);matchState[cid]={selected:null,matched:0,total:pairs.length,scoreId};
  const sl=[...pairs].sort(()=>Math.random()-.5);const sr=[...pairs].sort(()=>Math.random()-.5);
  sl.forEach((p,i)=>{const lb=document.createElement('button');lb.className='match-item';lb.id=cid+'_L'+i;lb.dataset.pair=p.left;lb.textContent=p.left;lb.onclick=()=>matchClick(cid,cid+'_L'+i,'L',p.left);lc.appendChild(lb);});
  sr.forEach((p,i)=>{const rb=document.createElement('button');rb.className='match-item';rb.id=cid+'_R'+i;rb.dataset.pair=p.left;rb.textContent=p.right;rb.onclick=()=>matchClick(cid,cid+'_R'+i,'R',p.left);rc.appendChild(rb);});
  wrap.appendChild(lc);wrap.appendChild(rc);document.getElementById(cid).appendChild(wrap);
}
function matchClick(cid,id,side,pair){
  const st=matchState[cid];const el=document.getElementById(id);if(el.classList.contains('matched-ok'))return;
  if(!st.selected){el.classList.add('selected');st.selected={id,side,pair};return;}
  if(st.selected.id===id){el.classList.remove('selected');st.selected=null;return;}
  if(st.selected.side===side){document.getElementById(st.selected.id).classList.remove('selected');el.classList.add('selected');st.selected={id,side,pair};return;}
  const a=st.selected,b={id,side,pair};const match=a.pair===b.pair;
  [a,b].forEach(x=>{const e=document.getElementById(x.id);e.classList.remove('selected');e.classList.add(match?'matched-ok':'matched-err');if(!match)setTimeout(()=>e.classList.remove('matched-err'),400);});
  if(match){st.matched++;if(st.matched===st.total){const sc=document.getElementById(st.scoreId);if(sc)sc.textContent='\uD83C\uDF89 \u00A1Todas correctas! '+st.total+' / '+st.total;}}st.selected=null;
}

async function playDialogueFull(cid,data){
  const btn=document.getElementById(cid+'_listenAll');const ind=document.getElementById(cid+'_playing');if(!data)return;if(btn)btn.disabled=true;if(ind)ind.style.display='block';
  for(const line of data.lines){await speakPromise(line.phrase,line.voice==='f'?VOICE_F:VOICE_M);await new Promise(r=>setTimeout(r,320));}
  if(btn){btn.disabled=false;btn.innerHTML='\uD83D\uDD0A \u00C9couter \u00E0 nouveau';}if(ind)ind.style.display='none';
}
function speakPromise(text,voiceId){
  if(!EL_KEY){return new Promise(res=>{const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.88;u.onend=res;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);});}
  return fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voiceId,{method:'POST',headers:{'xi-api-key':EL_KEY,'Content-Type':'application/json'},body:JSON.stringify({text,model_id:'eleven_multilingual_v2',language_code:'fr',voice_settings:{stability:0.5,similarity_boost:0.75}})})
  .then(r=>r.blob()).then(blob=>new Promise(res=>{const url=URL.createObjectURL(blob);const a=new Audio(url);a.play();a.onended=()=>{URL.revokeObjectURL(url);res();};})).catch(()=>speakPromise(text,null));
}
async function playLineKaraoke(cid,li,line,btn){
  if(!line)return;const words=line.phrase.split(' ');const voiceId=line.voice==='f'?VOICE_F:VOICE_M;btn.disabled=true;
  words.forEach((_,wi)=>{const s=document.getElementById(cid+'_w'+li+'_'+wi);if(s)s.style.color='rgba(255,255,255,0.5)';});
  const sk=(dur)=>{const ms=(dur*1000)/words.length;words.forEach((_,wi)=>setTimeout(()=>{const s=document.getElementById(cid+'_w'+li+'_'+wi);if(s)s.style.color='#ffd166';},wi*ms));setTimeout(()=>{btn.disabled=false;},dur*1000+200);};
  if(!EL_KEY){const u=new SpeechSynthesisUtterance(line.phrase);u.lang='fr-FR';u.rate=0.88;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);sk(words.length*0.42);return;}
  try{const r=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voiceId,{method:'POST',headers:{'xi-api-key':EL_KEY,'Content-Type':'application/json'},body:JSON.stringify({text:line.phrase,model_id:'eleven_multilingual_v2',language_code:'fr',voice_settings:{stability:0.5,similarity_boost:0.75}})});
  const blob=await r.blob();const url=URL.createObjectURL(blob);const audio=new Audio(url);
  audio.addEventListener('loadedmetadata',()=>sk(audio.duration));audio.play();audio.onended=()=>{URL.revokeObjectURL(url);btn.disabled=false;};}catch{btn.disabled=false;}
}
function answerDLQ(cid,qi,chosen,correct,total){
  const key=cid+'_'+qi;if(dlTally[key])return;dlTally[key]={done:true,wasCorrect:chosen===correct};
  const opts=document.querySelectorAll('#'+cid+'_opts_'+qi+' .opt');
  opts.forEach((b,i)=>{b.disabled=true;if(i===correct)b.classList.add('correct');else if(i===chosen&&chosen!==correct)b.classList.add('wrong');});
  const fb=document.getElementById(cid+'_fb_'+qi);fb.textContent=chosen===correct?'\u2705 \u00A1Correcto!':'\u274C Respuesta: '+opts[correct].textContent;fb.style.cssText='color:'+(chosen===correct?'#1d7a4c':'#c0392b')+';font-size:12px;margin-top:6px;font-weight:700';
  let answered=0,good=0;for(let i=0;i<total;i++){if(dlTally[cid+'_'+i]){answered++;if(dlTally[cid+'_'+i].wasCorrect)good++;}}
  if(answered===total){const sc=document.getElementById(cid+'_score');if(sc){sc.classList.add('show');const pct=good/total;
  document.getElementById(cid+'_sc_em').textContent=pct>=.75?'\uD83C\uDF89':pct>=.5?'\uD83D\uDC4D':'\uD83D\uDCAA';
  document.getElementById(cid+'_sc_n').textContent=good+' / '+total;
  document.getElementById(cid+'_sc_m').textContent=pct>=.75?'\u00A1Excelente comprensi\u00F3n!':pct>=.5?'\u00A1Bien! Vuelve a escuchar.':'Escucha el di\u00E1logo otra vez.';
  sc.scrollIntoView({behavior:'smooth',block:'nearest'});}
  setTimeout(()=>{const p2=document.getElementById(cid+'_phase2');if(p2){p2.style.display='block';p2.style.animation='fadein .4s ease';p2.scrollIntoView({behavior:'smooth',block:'nearest'});}},900);}
}

function buildMobNav(){
  const nav=document.getElementById('mob-nav');if(!nav)return;
  const colors=['var(--l1)','var(--l2)','var(--l3)','var(--l4)','var(--l5)'];
  [{n:1,label:'\uD83D\uDCC5 L1'},{n:2,label:'\uD83C\uDFDB L2'},{n:3,label:'\uD83D\uDCCD L3'},{n:4,label:'\uD83D\uDDFA L4'},{n:5,label:'\uD83D\uDE8C L5'}].forEach(l=>{
    const b=document.createElement('button');b.className='mob-nav-btn'+(l.n===1?' active':'');if(l.n===1)b.style.background='var(--l1)';
    b.dataset.l=l.n;b.textContent=l.label;
    b.onclick=()=>{showL(l.n);document.querySelectorAll('.mob-nav-btn').forEach(x=>{x.classList.remove('active');x.style.background='';});b.classList.add('active');b.style.background=colors[l.n-1];};
    nav.appendChild(b);});
}

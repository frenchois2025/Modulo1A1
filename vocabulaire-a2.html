<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulaire A2 — Français pour hispanophones</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef; --white: #ffffff; --text: #1c1c2e; --muted: #7a7a8c; --border: #e4ddd4;
  --a2: #2a7dd1; --a2l: #deeeff;
  --success: #2eaa6b; --success-l: #dcf5ea;
  --error: #c0392b; --error-l: #fdecea;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 60% 40% at 5% 10%, rgba(42,125,209,.07) 0%, transparent 60%),
              radial-gradient(ellipse 50% 40% at 95% 90%, rgba(42,125,209,.04) 0%, transparent 60%);
}

/* ── HEADER ─────────────────────── */
.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 16px;
  padding: 20px 28px;
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
}
.header-back {
  font-size: 13px; font-weight: 700; color: var(--muted);
  text-decoration: none; display: flex; align-items: center; gap: 6px;
  transition: color .2s;
}
.header-back:hover { color: var(--a2); }
.header-divider { color: var(--border); }
.header-badge {
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; padding: 4px 12px; border-radius: 20px;
  background: var(--a2l); color: var(--a2);
}
.header-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--text); }

/* ── LAYOUT ──────────────────────── */
.main { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; }

/* ── TABS ────────────────────────── */
.tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.tab {
  background: var(--white); border: 1.5px solid var(--border); border-radius: 14px;
  padding: 14px 10px 12px; cursor: pointer; text-align: center;
  transition: all .2s; color: inherit;
}
.tab:hover { border-color: var(--a2); transform: translateY(-1px); }
.tab.active { background: var(--a2); border-color: var(--a2); }
.tab-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
.tab-name { font-size: 12px; font-weight: 800; color: var(--text); }
.tab-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }
.tab.active .tab-name { color: rgba(255,255,255,.9); }
.tab.active .tab-desc { color: rgba(255,255,255,.65); }

/* ── CATEGORY PILLS ─────────────── */
.cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.cat {
  padding: 4px 12px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--white);
  font-size: 11px; font-weight: 700; cursor: pointer;
  transition: all .18s; color: var(--muted);
}
.cat:hover { border-color: var(--a2); color: var(--a2); }
.cat.active { background: var(--a2); border-color: var(--a2); color: white; }

/* ── MODULE TAG PILLS ───────────── */
.mod-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.mod-tag {
  padding: 3px 10px; border-radius: 20px;
  border: 1.5px solid var(--a2l); background: var(--a2l);
  font-size: 10px; font-weight: 800; cursor: pointer;
  transition: all .18s; color: var(--a2);
}
.mod-tag:hover { background: var(--a2); color: white; border-color: var(--a2); }
.mod-tag.active { background: var(--a2); color: white; border-color: var(--a2); }

/* ── SCOREBAR ────────────────────── */
.scorebar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; background: var(--white);
  border: 1.5px solid var(--border); border-radius: 14px;
  margin-bottom: 14px;
}
.score-pill { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 800; }
.score-pill.ok  { color: var(--success); }
.score-pill.err { color: var(--error); }
.streak { font-size: 12px; color: #d97706; font-weight: 800; display: none; }
.streak.on { display: block; }
.prog { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--muted); }

/* ── CARD ────────────────────────── */
.card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 18px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(28,28,46,.08);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.card.pop { animation: pop .3s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from { transform: scale(.97); opacity: .7; } to { transform: scale(1); opacity: 1; } }

.card-top {
  background: linear-gradient(135deg, #1a4a8a 0%, #2a7dd1 100%);
  padding: 32px 28px 28px;
  min-height: 190px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden; text-align: center;
}
.card-top::after {
  content: ''; position: absolute;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(255,255,255,.06);
  top: -70px; right: -50px; pointer-events: none;
}

.card-cat-tag {
  position: absolute; top: 12px; right: 14px;
  font-size: 10px; font-weight: 800; letter-spacing: .5px;
  text-transform: uppercase;
  background: rgba(255,255,255,.15); color: rgba(255,255,255,.85);
  padding: 3px 10px; border-radius: 20px;
}
.card-mod-tag {
  position: absolute; top: 12px; left: 14px;
  font-size: 9px; font-weight: 800;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.6);
  padding: 3px 8px; border-radius: 20px;
}
.card-mode-label {
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase; color: rgba(255,255,255,.6);
  margin-bottom: 12px; position: relative;
}
.card-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 700; color: white;
  line-height: 1.2; position: relative;
}
.card-hint { margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.55); position: relative; }

/* Dictée zone */
.audio-zone {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px; position: relative;
}
.btn-listen {
  width: 68px; height: 68px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,.4);
  background: rgba(255,255,255,.18);
  color: white; font-size: 1.7rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s; backdrop-filter: blur(4px);
}
.btn-listen:hover { background: rgba(255,255,255,.28); border-color: rgba(255,255,255,.7); transform: scale(1.06); }
.btn-listen:disabled { opacity: .5; cursor: wait; }
.btn-listen.playing { animation: ripple 1.4s ease-in-out infinite; }
@keyframes ripple {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,.3); }
  50%      { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
}
.listen-label { font-size: 11px; color: rgba(255,255,255,.55); font-weight: 700; letter-spacing: .5px; }
.btn-replay {
  background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.75); font-size: 12px; font-weight: 700;
  padding: 4px 14px; border-radius: 20px; cursor: pointer;
  transition: all .18s; font-family: 'Nunito', sans-serif;
}
.btn-replay:hover { background: rgba(255,255,255,.22); color: white; }
.btn-replay:disabled { opacity: .4; cursor: wait; }

/* ── CARD BOTTOM ─────────────────── */
.card-bottom { padding: 22px 22px 18px; }
.input-row { display: flex; gap: 8px; }
.answer-input {
  flex: 1; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 15px; font-family: 'Nunito', sans-serif;
  outline: none; background: var(--bg); color: var(--text);
  transition: border-color .2s, background .2s; font-weight: 600;
}
.answer-input:focus { border-color: var(--a2); background: var(--white); }
.answer-input.ok  { border-color: var(--success); background: var(--success-l); }
.answer-input.err { border-color: var(--error);   background: var(--error-l); }
.answer-input:disabled { opacity: .85; }

.btn-check {
  padding: 12px 16px; background: var(--a2); color: white;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 800; cursor: pointer;
  transition: background .18s, transform .1s;
  font-family: 'Nunito', sans-serif;
}
.btn-check:hover { background: #1a5faa; }
.btn-check:active { transform: scale(.95); }

.feedback {
  margin-top: 12px; padding: 10px 14px;
  border-radius: 12px; font-size: 14px; font-weight: 600;
  display: none; align-items: center; gap: 8px;
  animation: fadein .2s ease;
}
@keyframes fadein { from { opacity:0; transform:translateY(4px) } to { opacity:1; } }
.feedback.ok  { display:flex; background:var(--success-l); color:var(--success); border:1.5px solid #a7f3d0; }
.feedback.err { display:flex; background:var(--error-l);   color:var(--error);   border:1.5px solid #fca5a5; }
.feedback-text strong { font-family: 'Playfair Display', serif; font-size: 1.05rem; }
.feedback-text .fb-es { font-size: .85rem; font-weight: 600; opacity: .75; margin-left: 4px; }

.btn-next {
  width: 100%; margin-top: 10px; padding: 12px;
  background: var(--text); color: white; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 800; cursor: pointer;
  display: none; transition: opacity .18s;
  font-family: 'Nunito', sans-serif; letter-spacing: .3px;
}
.btn-next:hover { opacity: .85; }
.btn-next.on { display: block; animation: fadein .2s ease; }

/* ── API BADGE ───────────────────── */
.api-badge {
  position: fixed; bottom: 20px; right: 20px;
  padding: 6px 14px; border-radius: 20px;
  font-size: 11px; font-weight: 800; cursor: pointer;
  border: 1.5px solid; transition: all .2s; z-index: 10;
  font-family: 'Nunito', sans-serif;
}
.api-badge.set   { background: var(--success-l); color: var(--success); border-color: #a7f3d0; }
.api-badge.unset { background: var(--error-l);   color: var(--error);   border-color: #fca5a5; }

/* ── MODAL ───────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(28,28,46,.45);
  display: none; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 18px;
  padding: 28px; max-width: 360px; width: 90%;
  box-shadow: 0 24px 64px rgba(28,28,46,.18);
  border: 1.5px solid var(--border);
}
.modal h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 6px; }
.modal p  { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
.modal input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 14px; margin-bottom: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 600;
}
.modal input:focus { outline: none; border-color: var(--a2); }
.modal-btn {
  width: 100%; padding: 12px;
  background: var(--a2); color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 800; cursor: pointer;
  transition: background .18s; font-family: 'Nunito', sans-serif;
}
.modal-btn:hover { background: #1a5faa; }

@media (max-width: 500px) {
  .tabs { grid-template-columns: 1fr; gap: 6px; }
  .card-top { padding: 24px 18px; min-height: 160px; }
  .card-word { font-size: 1.8rem; }
  .header-title { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-back">← Volver al inicio</a>
  <span class="header-divider">|</span>
  <span class="header-badge">A2</span>
  <span class="header-title">Entraînement au vocabulaire</span>
</header>

<main class="main">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tab-es-fr" onclick="setMode('es-fr')">
      <span class="tab-icon">🇪🇸→🇫🇷</span>
      <div class="tab-name">ES → FR</div>
      <div class="tab-desc">Traducir al francés</div>
    </div>
    <div class="tab" id="tab-fr-es" onclick="setMode('fr-es')">
      <span class="tab-icon">🇫🇷→🇪🇸</span>
      <div class="tab-name">FR → ES</div>
      <div class="tab-desc">Traducir al español</div>
    </div>
    <div class="tab" id="tab-dictee" onclick="setMode('dictee')">
      <span class="tab-icon">🎧</span>
      <div class="tab-name">Dictée</div>
      <div class="tab-desc">¿Qué escuchaste?</div>
    </div>
  </div>

  <!-- FILTER BY MODULE -->
  <div class="mod-tags" id="mod-tags"></div>

  <!-- FILTER BY CATEGORY -->
  <div class="cats" id="cats"></div>

  <!-- SCOREBAR -->
  <div class="scorebar">
    <span class="score-pill ok">✅ <span id="sc-ok">0</span></span>
    <span class="score-pill err">❌ <span id="sc-err">0</span></span>
    <span class="streak" id="streak-el"></span>
    <span class="prog" id="prog">1 / —</span>
  </div>

  <!-- CARD -->
  <div class="card" id="card">
    <div class="card-top">
      <span class="card-mod-tag" id="card-mod-tag"></span>
      <span class="card-cat-tag" id="card-cat-tag"></span>
      <div class="card-mode-label" id="mode-label"></div>

      <div class="card-word" id="card-word"></div>

      <div class="audio-zone" id="audio-zone" style="display:none">
        <button class="btn-listen" id="btn-listen" onclick="playAudio()">🔊</button>
        <span class="listen-label">TOCA PARA ESCUCHAR</span>
        <button class="btn-replay" id="btn-replay" onclick="playAudio()">↻ Repetir</button>
      </div>

      <div class="card-hint" id="card-hint"></div>
    </div>

    <div class="card-bottom">
      <div class="input-row">
        <input type="text" class="answer-input" id="answer-input"
               placeholder="Tu respuesta…"
               autocomplete="off" autocorrect="off" spellcheck="false"
               onkeydown="if(event.key==='Enter') checkAnswer()">
        <button class="btn-check" onclick="checkAnswer()">✓</button>
      </div>
      <div class="feedback" id="feedback">
        <span id="fb-icon"></span>
        <span class="feedback-text" id="fb-text"></span>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextWord()">Siguiente palabra →</button>
    </div>
  </div>

</main>

<div class="api-badge unset" id="api-badge" onclick="openModal()">🔑 Configurar API</div>

<div class="overlay" id="modal-overlay" onclick="closeIfOut(event)">
  <div class="modal">
    <h3>🔑 API ElevenLabs</h3>
    <p>Para escuchar a Charlotte y Daniel. Tu clave se guarda solo en este navegador.</p>
    <input type="password" id="modal-input" placeholder="Pega tu clave aquí…">
    <button class="modal-btn" onclick="saveKey()">Guardar</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  VOCABULARY A2
//  Aligné sur programme + CECRL A2
//  Aucun mot présent dans le vocabulaire A1
//  mod: module du programme A2 (1-6)
//  g:"m"|"f" — genre pour ElevenLabs
//  noArt:true — verbes, adjectifs, adverbes, expressions
// ═══════════════════════════════════════════════
const VOCAB = [

  // ── MODULE 1 · Identité & personnalité ─────────────────
  // Nuevos adjetivos de carácter (no repetidos del A1)
  { fr:"ambitieux",             es:"ambicioso",                   g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"généreux",              es:"generoso",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"honnête",               es:"honesto",                     g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"jaloux",                es:"celoso",                      g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"optimiste",             es:"optimista",                   g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"pessimiste",            es:"pesimista",                   g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"nerveux",               es:"nervioso",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sensible",              es:"sensible",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"responsable",           es:"responsable",                 g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"indépendant",           es:"independiente",               g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sociable",              es:"sociable",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"réservé",               es:"reservado",                   g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"bavard",                es:"hablador / parlanchín",       g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"discret",               es:"discreto",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sympa",                 es:"simpático",                   g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"curieux",               es:"curioso",                     g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"créatif",               es:"creativo",                    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sportif",               es:"deportista",                  g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"gourmand",              es:"glotón / goloso",             g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sincère",               es:"sincero",                     g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"fidèle",                es:"fiel",                        g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"intelligent",           es:"inteligente",                 g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"avoir l'air",           es:"parecer / tener pinta de",    g:"m", cat:"Personnalité",   mod:1, noArt:true },
  { fr:"sembler",               es:"parecer",                     g:"m", cat:"Personnalité",   mod:1, noArt:true },

  // ── MODULE 1 · Obligation & nécessité ──────────────────
  { fr:"il faut",               es:"hay que / se debe",           g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"il est nécessaire de",  es:"es necesario",                g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"il est important de",   es:"es importante",               g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"il est interdit de",    es:"está prohibido",              g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"être obligé de",        es:"estar obligado a",            g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"avoir besoin de",       es:"necesitar",                   g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"il vaut mieux",         es:"es mejor / más vale",         g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"il suffit de",          es:"basta con",                   g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"ne… plus",              es:"ya no",                       g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"ne… rien",              es:"no… nada",                    g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"ne… personne",          es:"no… nadie",                   g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"ne… jamais",            es:"no… nunca",                   g:"m", cat:"Obligation",     mod:1, noArt:true },
  { fr:"ne… que",               es:"solo / solamente",            g:"m", cat:"Obligation",     mod:1, noArt:true },

  // ── MODULE 1 · Connecteurs avancés ─────────────────────
  { fr:"pourtant",              es:"sin embargo / pero aún así",  g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"néanmoins",             es:"no obstante",                 g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"en revanche",           es:"en cambio",                   g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"d'ailleurs",            es:"además / por otro lado",      g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"de plus",               es:"además",                      g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"en fait",               es:"en realidad / de hecho",      g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"c'est-à-dire",          es:"es decir",                    g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"par exemple",           es:"por ejemplo",                 g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"en effet",              es:"en efecto",                   g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"par conséquent",        es:"por consiguiente",            g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"malgré",                es:"a pesar de",                  g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"grâce à",               es:"gracias a",                   g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"à cause de",            es:"a causa de / por culpa de",   g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"au lieu de",            es:"en vez de / en lugar de",     g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"quant à",               es:"en cuanto a",                 g:"m", cat:"Connecteurs",    mod:1, noArt:true },
  { fr:"autrement dit",         es:"dicho de otro modo",          g:"m", cat:"Connecteurs",    mod:1, noArt:true },

// ─────────────────────────────────────────────
//  MODULE LABELS
// ─────────────────────────────────────────────
const MODULE_LABELS = {
  1: "M1 · Identité",
  2: "M2 · Passé",
  3: "M3 · Opinions",
  4: "M4 · Voyage",
  5: "M5 · Santé",
  6: "M6 · Communication",
};

// ─────────────────────────────────────────────
//  ELEVENLABS
// ─────────────────────────────────────────────
const VOICE_F = 'XB0fDUnXU5powFXDhCwa'; // Charlotte
const VOICE_M = 'onwK4e9ZLuTAKqWW03F9'; // Daniel
const EL_MODEL = 'eleven_multilingual_v2';

function getKey() { return localStorage.getItem('elevenlabs_api_key') || ''; }
function openModal() {
  document.getElementById('modal-input').value = getKey();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeIfOut(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
function saveKey() {
  localStorage.setItem('elevenlabs_api_key', document.getElementById('modal-input').value.trim());
  document.getElementById('modal-overlay').classList.remove('open');
  updateBadge();
}
function updateBadge() {
  const b = document.getElementById('api-badge');
  b.className = getKey() ? 'api-badge set' : 'api-badge unset';
  b.textContent = getKey() ? '🔑 API conectada' : '🔑 Configurar API';
}

async function speakEL(text, gender) {
  const key = getKey();
  if (!key) { speakBrowser(text); return; }
  const voiceId = gender === 'f' ? VOICE_F : VOICE_M;
  const lb = document.getElementById('btn-listen');
  const rb = document.getElementById('btn-replay');
  [lb, rb].forEach(b => { if (b) b.disabled = true; });
  if (lb) lb.classList.add('playing');
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: { 'xi-api-key': key, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text, model_id: EL_MODEL, language_code: 'fr',
        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
      })
    });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = new Audio(url);
    a.play();
    a.onended = () => {
      URL.revokeObjectURL(url);
      [lb, rb].forEach(b => { if (b) b.disabled = false; });
      if (lb) lb.classList.remove('playing');
    };
  } catch {
    speakBrowser(text);
    [lb, rb].forEach(b => { if (b) b.disabled = false; });
    if (lb) lb.classList.remove('playing');
  }
}
function speakBrowser(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let mode = 'es-fr', selCat = 'Todas', selMod = 0;
let pool = [], idx = 0, cur = null, answered = false;
let nOk = 0, nErr = 0, streak = 0;

function setMode(m) {
  mode = m;
  ['es-fr','fr-es','dictee'].forEach(k =>
    document.getElementById('tab-' + k).classList.toggle('active', k === m)
  );
  startFresh();
}

function buildPool() {
  let src = VOCAB;
  if (selMod > 0) src = src.filter(w => w.mod === selMod);
  if (selCat !== 'Todas') src = src.filter(w => w.cat === selCat);
  pool = [...src].sort(() => Math.random() - 0.5);
  idx = 0;
}

function startFresh() {
  nOk = 0; nErr = 0; streak = 0;
  buildPool(); updateScore(); loadWord();
}

// ── Build filters ────────────────────────────
function buildModTags() {
  const el = document.getElementById('mod-tags');
  el.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'mod-tag active'; allBtn.textContent = 'Todos los módulos';
  allBtn.onclick = () => {
    selMod = 0; selCat = 'Todas';
    document.querySelectorAll('.mod-tag').forEach(x => x.classList.remove('active'));
    allBtn.classList.add('active');
    buildCats(); startFresh();
  };
  el.appendChild(allBtn);

  [1,2,3,4,5,6].forEach(n => {
    const b = document.createElement('button');
    b.className = 'mod-tag';
    b.textContent = MODULE_LABELS[n];
    b.onclick = () => {
      selMod = n; selCat = 'Todas';
      document.querySelectorAll('.mod-tag').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      buildCats(); startFresh();
    };
    el.appendChild(b);
  });
}

function buildCats() {
  let src = VOCAB;
  if (selMod > 0) src = src.filter(w => w.mod === selMod);
  const cats = ['Todas', ...new Set(src.map(w => w.cat))];
  const el = document.getElementById('cats');
  el.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat' + (c === 'Todas' ? ' active' : '');
    b.textContent = c;
    b.onclick = () => {
      selCat = c;
      document.querySelectorAll('.cat').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      startFresh();
    };
    el.appendChild(b);
  });
}

// ── Load one word ────────────────────────────
function loadWord() {
  if (!pool.length) { pool = [...VOCAB].sort(() => Math.random() - 0.5); idx = 0; }
  if (idx >= pool.length) { pool.sort(() => Math.random() - 0.5); idx = 0; }
  cur = pool[idx];
  answered = false;

  const card = document.getElementById('card');
  card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');

  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.className = 'answer-input'; inp.disabled = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').className = 'btn-next';
  document.getElementById('prog').textContent = `${idx + 1} / ${pool.length}`;
  document.getElementById('card-cat-tag').textContent = cur.cat;
  document.getElementById('card-mod-tag').textContent = MODULE_LABELS[cur.mod] || '';

  const wordEl    = document.getElementById('card-word');
  const audioZone = document.getElementById('audio-zone');
  const modeLabel = document.getElementById('mode-label');
  const hintEl    = document.getElementById('card-hint');

  if (mode === 'es-fr') {
    modeLabel.textContent = cur.noArt ? 'Traduce al francés' : 'Traduce al francés con el artículo';
    const esRaw = cur.es.split('/')[0].trim();
    wordEl.textContent = cur.noArt ? esRaw : esRaw.replace(/^(el|la|los|las|un|una)\s+/i, '');
    wordEl.style.display = 'block';
    audioZone.style.display = 'none';
    inp.placeholder = cur.noArt ? 'traduction en français…' : 'le / la + mot…';
    hintEl.textContent = cur.noArt ? '' : '💡 ¿Qué artículo lleva en francés?';

  } else if (mode === 'fr-es') {
    modeLabel.textContent = 'Traduce al español';
    wordEl.textContent = cur.fr;
    wordEl.style.display = 'block';
    audioZone.style.display = 'none';
    inp.placeholder = 'traducción en español…';
    hintEl.textContent = '';

  } else {
    modeLabel.textContent = cur.noArt ? '¿Qué escuchaste? Escribe en francés' : '¿Qué escuchaste? Escribe en francés con el artículo';
    wordEl.style.display = 'none';
    audioZone.style.display = 'flex';
    inp.placeholder = cur.noArt ? 'traduction en français…' : 'artículo + mot…';
    hintEl.textContent = '';
    setTimeout(() => playAudio(), 500);
  }

  inp.focus();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function playAudio() { if (cur) speakEL(cur.fr, cur.g); }

function norm(s) {
  return s.toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/['']/g, "'").replace(/\s+/g, ' ');
}

function checkAnswer() {
  if (answered) { nextWord(); return; }
  const inp = document.getElementById('answer-input');
  const raw = inp.value.trim();
  if (!raw) return;

  answered = true; inp.disabled = true;

  let correct = false, correctAnswer = '';

  if (mode === 'es-fr') {
    correctAnswer = cur.fr;
    if (cur.noArt) {
      const variants = cur.fr.split('/').map(s => s.trim());
      correct = variants.some(v => norm(raw) === norm(v));
    } else {
      const variants = [cur.fr,
        cur.fr.replace(/^le /, 'un ').replace(/^la /, 'une ')
              .replace(/^l'/, 'un ').replace(/^l'/, 'un ')];
      correct = variants.some(v => norm(raw) === norm(v));
    }

  } else if (mode === 'fr-es') {
    correctAnswer = cur.es;
    const variants = cur.es.split('/').map(s => s.trim());
    correct = variants.some(v => {
      const vc = v.replace(/^(el|la|los|las|un|una)\s+/i,'').trim();
      const rc = raw.replace(/^(el|la|los|las|un|una)\s+/i,'').trim();
      return norm(rc) === norm(vc) || norm(raw) === norm(v);
    });

  } else {
    correctAnswer = cur.fr;
    correct = norm(raw) === norm(cur.fr);
    if (!correct && !cur.noArt) {
      const noArt = cur.fr.replace(/^(le|la|les|l')\s*/i,'').trim();
      correct = norm(raw) === norm(noArt);
    }
  }

  const fbEl  = document.getElementById('feedback');
  const fbTxt = document.getElementById('fb-text');
  const fbIcon= document.getElementById('fb-icon');
  const esHint = mode === 'dictee'
    ? ` <span class="fb-es">= ${cur.es.split('/')[0].trim()}</span>`
    : '';

  if (correct) {
    nOk++; streak++;
    inp.className = 'answer-input ok';
    fbEl.className = 'feedback ok';
    fbIcon.textContent = '✅';
    fbTxt.innerHTML = `¡Correcto! <strong>${correctAnswer}</strong>${esHint}`;
    if (mode !== 'fr-es') setTimeout(() => speakEL(cur.fr, cur.g), 350);
  } else {
    nErr++; streak = 0;
    inp.className = 'answer-input err';
    fbEl.className = 'feedback err';
    fbIcon.textContent = '❌';
    fbTxt.innerHTML = `La respuesta es: <strong>${correctAnswer}</strong>${esHint}`;
    if (mode !== 'fr-es') setTimeout(() => speakEL(cur.fr, cur.g), 350);
  }

  updateScore();
  document.getElementById('btn-next').className = 'btn-next on';
}

function nextWord() { idx++; loadWord(); }

function updateScore() {
  document.getElementById('sc-ok').textContent  = nOk;
  document.getElementById('sc-err').textContent = nErr;
  const sEl = document.getElementById('streak-el');
  if (streak >= 3) {
    sEl.textContent = `🔥 ${streak} seguidos`; sEl.className = 'streak on';
  } else { sEl.className = 'streak'; }
}

// ── INIT ─────────────────────────────────────
buildModTags();
buildCats();
updateBadge();
startFresh();
</script>
